name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Go Test
        run: |
          cd backend
          go test ./...
      - name: Build backend image
        run: docker build -t ludo-backend ./backend
      - name: Build frontend image
        run: docker build -t ludo-frontend ./frontend
